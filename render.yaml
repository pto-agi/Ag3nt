services:
  - type: web
    name: antigravity-agent
    runtime: node
    repo: https://github.com/pto-agi/Ag3nt
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3847"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: TRAINERIZE_GROUP_ID
        sync: false
      - key: TRAINERIZE_API_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
